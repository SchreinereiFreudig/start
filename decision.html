<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Urlaubsantrag · Auftragsplanung Freudig</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;margin:0;padding:40px 20px;color:#111827;text-align:center;min-height:100vh;}
  .card{max-width:560px;margin:40px auto;background:white;border-radius:14px;padding:42px 32px;box-shadow:0 4px 16px rgba(0,0,0,.06);border:1px solid #e2e8f0;}
  .icon{font-size:54px;line-height:1;margin-bottom:18px;}
  h1{margin:0 0 10px;font-size:26px;}
  .sub{color:#64748b;font-size:14px;margin-bottom:24px;}
  .info{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:18px 20px;margin:18px 0;text-align:left;}
  .info strong{color:#0f172a;}
  .row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;}
  .row .lbl{color:#6b7280;}
  .foot{color:#9ca3af;font-size:11px;margin-top:30px;}
  .ok h1{color:#16a34a;}
  .err h1{color:#dc2626;}
  .warn h1{color:#f59e0b;}
  .loading{color:#64748b;font-size:14px;}
  .spinner{display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="loading"><span class="spinner"></span>Antrag wird verarbeitet ...</div>
</div>

<script>
const FN_URL = "https://rgzendkvoeaurfbymkcy.supabase.co/functions/v1/decide-vacation";
const ANON   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnemVuZGt2b2VhdXJmYnlta2N5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTQxMzksImV4cCI6MjA5MTkzMDEzOX0.h8cqR73GtV_J56VvdtfeJWJIjziLv3x_AHkZ0sJIZwU";

const params = new URLSearchParams(location.search);
const token  = params.get("token");
const action = params.get("action");

const card = document.getElementById("card");

const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

function show(cls, icon, title, sub, body = "") {
  card.className = "card " + cls;
  card.innerHTML = `
    <div class="icon">${icon}</div>
    <h1>${title}</h1>
    <p class="sub">${sub}</p>
    ${body}
    <p class="foot">Auftragsplanung Freudig</p>
  `;
}

async function decide() {
  if (!token || !["approve", "reject"].includes(action)) {
    show("err", "⚠️", "Ungültiger Link", "Der Link ist nicht gültig oder unvollständig.");
    return;
  }

  try {
    const r = await fetch(`${FN_URL}?token=${encodeURIComponent(token)}&action=${action}`, {
      method: "GET",
      headers: { "apikey": ANON, "Authorization": `Bearer ${ANON}` }
    });
    const data = await r.json();

    if (data.already) {
      const lbl = data.statusLabel || data.status;
      show(
        "warn",
        "ℹ️",
        "Antrag bereits bearbeitet",
        `Dieser Antrag wurde bereits <strong>${esc(lbl)}</strong>.`,
        data.empName ? `<div class="info">
          <div class="row"><span class="lbl">Mitarbeiter:</span><strong>${esc(data.empName)}</strong></div>
          <div class="row"><span class="lbl">Zeitraum:</span><strong>${esc(data.period)}</strong></div>
        </div>` : ""
      );
      return;
    }

    if (!data.ok) {
      show("err", "❌", "Fehler", data.error || "Antrag konnte nicht verarbeitet werden.");
      return;
    }

    const isApprove = data.status === "approved";
    const info = `<div class="info">
      <div class="row"><span class="lbl">Mitarbeiter:</span><strong>${esc(data.empName)}</strong></div>
      <div class="row"><span class="lbl">Zeitraum:</span><strong>${esc(data.period)}</strong></div>
      ${data.kommentar ? `<div class="row"><span class="lbl">Kommentar:</span><span>${esc(data.kommentar)}</span></div>` : ""}
    </div>`;

    if (isApprove) {
      show("ok", "✅", "Antrag genehmigt", "Eine Mail wurde an die Planung gesendet, der Mitarbeiter wurde benachrichtigt.", info);
    } else {
      show("err", "✗", "Antrag abgelehnt", "Der Mitarbeiter wurde benachrichtigt.", info);
    }
  } catch (e) {
    show("err", "❌", "Fehler", "Ein Fehler ist aufgetreten: " + (e.message || e));
  }
}

decide();
</script>
</body>
</html>
